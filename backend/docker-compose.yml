version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: finance_calculator_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - finance_calculator_pgdata:/var/lib/postgresql/data

volumes:
  finance_calculator_pgdata: