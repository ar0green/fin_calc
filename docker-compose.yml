services:
  postgres:
    image: postgres:16
    container_name: finance_calculator_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finance_calculator}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - finance_calculator_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-finance_calculator}"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance_calculator_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: finance_calculator_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8090}:80"
    depends_on:
      backend:
        condition: service_healthy

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance_calculator_seed
    env_file:
      - .env
    command: >
      sh -c "python -m alembic upgrade head && python -m scripts.seed_demo_data"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - seed

volumes:
  finance_calculator_pgdata: